name: Unit Tests

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Check out deckr dependency
        run: git clone --depth=1 https://github.com/kws/deckr.git ../deckr

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Build dependency wheels
        run: |
          (cd ../deckr && uv build --wheel)

      - name: Run unit tests
        run: |
          uv sync --dev --find-links ../deckr/dist
          uv run pytest --cov=src/deckr --cov-report=term-missing --cov-report=xml

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage.xml
          path: coverage.xml
